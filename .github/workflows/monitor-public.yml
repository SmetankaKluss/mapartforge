name: Monitor public MapKluss infrastructure

on:
  schedule:
    - cron: '7,37 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: monitor-public
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - name: Run public infrastructure smoke
        id: smoke
        continue-on-error: true
        env:
          MAPKLUSS_ANON_KEY: ${{ vars.MAPKLUSS_ANON_KEY }}
        run: |
          test -n "$MAPKLUSS_ANON_KEY"
          node deploy/monitoring/public-smoke.mjs
      - name: Report or close actionable alert
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node deploy/monitoring/report-alert.mjs public '${{ steps.smoke.outcome }}'
