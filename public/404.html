<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA routing hack:
    // Encode the full path into ?p= and redirect to index.html
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;
    var redirectUrl = window.location.origin + '/?p=' + encodeURIComponent(path + search + hash);
    window.location.replace(redirectUrl);
  </script>
</head>
<body></body>
</html>
