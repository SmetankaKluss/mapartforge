name: Backup Supabase PostgreSQL off-provider

on:
  schedule:
    - cron: '23 2 * * *'
  workflow_dispatch:
    inputs:
      restore_drill:
        description: Restore the uploaded archive into a disposable local Supabase stack
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: backup-supabase
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate configuration
        env:
          SUPABASE_DB_HOST: ${{ vars.SUPABASE_DB_HOST }}
          SUPABASE_DB_USER: ${{ vars.SUPABASE_DB_USER }}
          YC_BACKUP_BUCKET: ${{ vars.YC_BACKUP_BUCKET }}
          YC_BACKUP_KMS_KEY_ID: ${{ vars.YC_BACKUP_KMS_KEY_ID }}
          RESTORE_DRILL_INPUT: ${{ inputs.restore_drill }}
        run: |
          test -n "$SUPABASE_DB_HOST"
          test -n "$SUPABASE_DB_USER"
          test -n "$YC_BACKUP_BUCKET"
          test -n "$YC_BACKUP_KMS_KEY_ID"
          daily_prefix="postgres/daily/$(date -u +%Y/%m/%d)"
          monthly_prefix=
          if [[ $(date -u +%d) == "01" ]]; then
            monthly_prefix="postgres/monthly/$(date -u +%Y/%m)"
          fi
          run_restore_drill=false
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && "$RESTORE_DRILL_INPUT" == "true" ]]; then
            run_restore_drill=true
          elif [[ "$GITHUB_EVENT_NAME" == "schedule" && $(date -u +%d) == "01" ]]; then
            run_restore_drill=true
          fi
          {
            echo "MAPKLUSS_BACKUP_DIR=${RUNNER_TEMP}/mapkluss-backup"
            echo "MAPKLUSS_DAILY_PREFIX=$daily_prefix"
            echo "MAPKLUSS_MONTHLY_PREFIX=$monthly_prefix"
            echo "MAPKLUSS_RUN_RESTORE_DRILL=$run_restore_drill"
            echo "MAPKLUSS_RESTORE_DIR=${RUNNER_TEMP}/mapkluss-restore-download"
            echo "MAPKLUSS_RESTORE_PROJECT=${RUNNER_TEMP}/mapkluss-restore-project"
          } >> "$GITHUB_ENV"

      - name: Create portable Supabase PostgreSQL backup
        env:
          SUPABASE_DB_HOST: ${{ vars.SUPABASE_DB_HOST }}
          SUPABASE_DB_USER: ${{ vars.SUPABASE_DB_USER }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          MAPKLUSS_SUPABASE_CLI_VERSION: 2.109.1
          MAPKLUSS_POSTGRES_IMAGE: postgres:17.6-alpine@sha256:ef257d85f76e48da1c64832459b59fcaba1a4dac97bf5d7450c77753542eee94
        run: |
          test -n "$SUPABASE_DB_PASSWORD"
          echo "::add-mask::$SUPABASE_DB_PASSWORD"
          encoded_password=$(node -e 'process.stdout.write(encodeURIComponent(process.argv[1]))' -- "$SUPABASE_DB_PASSWORD")
          echo "::add-mask::$encoded_password"
          supabase_db_url=$(node -e '
            const [host, user, password] = process.argv.slice(1);
            const encodedUser = encodeURIComponent(user);
            const encodedPassword = encodeURIComponent(password);
            process.stdout.write(
              "postgresql://" + encodedUser + ":" + encodedPassword + "@" + host
                + ":5432/postgres?sslmode=require",
            );
          ' "$SUPABASE_DB_HOST" "$SUPABASE_DB_USER" "$SUPABASE_DB_PASSWORD")
          echo "::add-mask::$supabase_db_url"
          SUPABASE_DB_URL="$supabase_db_url" ./deploy/backups/backup-postgres.sh

      - name: Validate archive and checksum
        run: |
          archive=$(find "$MAPKLUSS_BACKUP_DIR" -name '*.tar.gz' -type f -print -quit)
          manifest="$archive.json"
          inventory="$archive.inventory.json"
          extract_dir="${RUNNER_TEMP}/mapkluss-backup-verify"
          test -s "$archive"
          test -s "$manifest"
          test -s "$inventory"
          node -e '
            const value = require(process.argv[1]);
            const failures = Object.entries(value).filter(([key, count]) => key.endsWith("_orphans") && count !== 0);
            if (failures.length > 0) {
              throw new Error("Source integrity violations: " + JSON.stringify(failures));
            }
          ' "$inventory"
          mkdir -p "$extract_dir"
          tar -xzf "$archive" -C "$extract_dir"
          node deploy/backups/verify-backup.mjs "$archive" "$extract_dir"

      - name: Upload to private Yandex Object Storage
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YC_BACKUP_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_BACKUP_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ru-central1
          AWS_PAGER: ''
          YC_BACKUP_BUCKET: ${{ vars.YC_BACKUP_BUCKET }}
          YC_STORAGE_ENDPOINT: https://storage.yandexcloud.net
        run: |
          test -n "$AWS_ACCESS_KEY_ID"
          test -n "$AWS_SECRET_ACCESS_KEY"
          command -v aws
          aws --version
          archive=$(find "$MAPKLUSS_BACKUP_DIR" -name '*.tar.gz' -type f -print -quit)
          inventory="$archive.inventory.json"
          manifest="$archive.json"

          upload_file() {
            local prefix=$1
            local file=$2
            local content_md5 sha256 metadata_json key content_type
            content_md5=$(openssl dgst -md5 -binary "$file" | base64 | tr -d '\n')
            sha256=$(sha256sum "$file" | awk '{print $1}')
            metadata_json=$(jq -nc --arg sha256 "$sha256" '{sha256: $sha256}')
            key="${prefix}/$(basename "$file")"
            content_type=application/json
            if [[ "$file" == *.tar.gz ]]; then
              content_type=application/gzip
            fi
            aws s3api put-object \
              --endpoint-url "$YC_STORAGE_ENDPOINT" \
              --bucket "$YC_BACKUP_BUCKET" \
              --key "$key" \
              --body "$file" \
              --content-type "$content_type" \
              --content-md5 "$content_md5" \
              --metadata "$metadata_json" \
              --no-cli-pager >/dev/null
          }

          upload_generation() {
            local prefix=$1
            upload_file "$prefix" "$archive"
            upload_file "$prefix" "$inventory"
            upload_file "$prefix" "$manifest"
          }

          upload_generation "$MAPKLUSS_DAILY_PREFIX"
          if [[ -n "$MAPKLUSS_MONTHLY_PREFIX" ]]; then
            upload_generation "$MAPKLUSS_MONTHLY_PREFIX"
          fi

      - name: Verify remote objects
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YC_BACKUP_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_BACKUP_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ru-central1
          AWS_PAGER: ''
          YC_BACKUP_BUCKET: ${{ vars.YC_BACKUP_BUCKET }}
          YC_BACKUP_KMS_KEY_ID: ${{ vars.YC_BACKUP_KMS_KEY_ID }}
          YC_STORAGE_ENDPOINT: https://storage.yandexcloud.net
        run: |
          archive=$(find "$MAPKLUSS_BACKUP_DIR" -name '*.tar.gz' -type f -print -quit)
          inventory="$archive.inventory.json"
          manifest="$archive.json"

          verify_file() {
            local prefix=$1
            local file=$2
            local key expected_size expected_sha metadata
            key="${prefix}/$(basename "$file")"
            expected_size=$(stat -c %s "$file")
            expected_sha=$(sha256sum "$file" | awk '{print $1}')
            metadata=$(aws s3api head-object \
              --endpoint-url "$YC_STORAGE_ENDPOINT" \
              --bucket "$YC_BACKUP_BUCKET" \
              --key "$key" \
              --no-cli-pager)
            if ! jq -e \
              --argjson expected_size "$expected_size" \
              --arg expected_sha "$expected_sha" \
              --arg expected_kms "$YC_BACKUP_KMS_KEY_ID" '
                ([.Metadata | to_entries[] | select(.key | ascii_downcase == "sha256") | .value][0]) as $remote_sha
                | .ContentLength == $expected_size
                and $remote_sha == $expected_sha
                and .ServerSideEncryption == "aws:kms"
                and (.SSEKMSKeyId | endswith($expected_kms))
              ' <<<"$metadata" >/dev/null; then
              jq -c \
                --argjson expected_size "$expected_size" \
                --arg expected_sha "$expected_sha" \
                --arg expected_kms "$YC_BACKUP_KMS_KEY_ID" '
                  {
                    content_length_match: (.ContentLength == $expected_size),
                    metadata_keys: ([.Metadata | keys[] | ascii_downcase] | sort),
                    metadata_sha_match: (([.Metadata | to_entries[] | select(.key | ascii_downcase == "sha256") | .value][0]) == $expected_sha),
                    server_side_encryption: (.ServerSideEncryption // "missing"),
                    kms_key_match: ((.SSEKMSKeyId // "") | endswith($expected_kms))
                  }
                ' <<<"$metadata" >&2
              return 1
            fi
          }

          verify_generation() {
            local prefix=$1
            verify_file "$prefix" "$archive"
            verify_file "$prefix" "$inventory"
            verify_file "$prefix" "$manifest"
          }

          verify_generation "$MAPKLUSS_DAILY_PREFIX"
          if [[ -n "$MAPKLUSS_MONTHLY_PREFIX" ]]; then
            verify_generation "$MAPKLUSS_MONTHLY_PREFIX"
          fi

      - name: Download and verify uploaded restore candidate
        if: env.MAPKLUSS_RUN_RESTORE_DRILL == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YC_BACKUP_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_BACKUP_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ru-central1
          AWS_PAGER: ''
          YC_BACKUP_BUCKET: ${{ vars.YC_BACKUP_BUCKET }}
          YC_STORAGE_ENDPOINT: https://storage.yandexcloud.net
        run: |
          install -d -m 700 "$MAPKLUSS_RESTORE_DIR"
          source_archive=$(find "$MAPKLUSS_BACKUP_DIR" -name '*.tar.gz' -type f -print -quit)

          download_file() {
            local source_file=$1
            local key destination
            key="${MAPKLUSS_DAILY_PREFIX}/$(basename "$source_file")"
            destination="${MAPKLUSS_RESTORE_DIR}/$(basename "$source_file")"
            aws s3api get-object \
              --endpoint-url "$YC_STORAGE_ENDPOINT" \
              --bucket "$YC_BACKUP_BUCKET" \
              --key "$key" \
              "$destination" \
              --no-cli-pager >/dev/null
            chmod 600 "$destination"
          }

          download_file "$source_archive"
          download_file "$source_archive.inventory.json"
          download_file "$source_archive.json"

          archive="${MAPKLUSS_RESTORE_DIR}/$(basename "$source_archive")"
          extract_dir="${RUNNER_TEMP}/mapkluss-restore-verify"
          install -d -m 700 "$extract_dir"
          tar -xzf "$archive" -C "$extract_dir"
          node deploy/backups/verify-backup.mjs "$archive" "$extract_dir"

      - name: Restore into disposable Supabase and compare inventory
        if: env.MAPKLUSS_RUN_RESTORE_DRILL == 'true'
        env:
          MAPKLUSS_SUPABASE_CLI_VERSION: 2.109.1
          MAPKLUSS_POSTGRES_IMAGE: postgres:17.6-alpine@sha256:ef257d85f76e48da1c64832459b59fcaba1a4dac97bf5d7450c77753542eee94
        run: |
          install -d -m 700 "$MAPKLUSS_RESTORE_PROJECT"
          start_log="${RUNNER_TEMP}/mapkluss-supabase-start.log"
          status_env="${RUNNER_TEMP}/mapkluss-supabase-status.env"

          npx --yes "supabase@${MAPKLUSS_SUPABASE_CLI_VERSION}" init \
            --workdir "$MAPKLUSS_RESTORE_PROJECT" \
            --yes >/dev/null

          if ! npx --yes "supabase@${MAPKLUSS_SUPABASE_CLI_VERSION}" start \
            --workdir "$MAPKLUSS_RESTORE_PROJECT" \
            --exclude analytics,edge-runtime,functions,imgproxy,inbucket,meta,studio,vector \
            --yes >"$start_log" 2>&1; then
            echo "Disposable Supabase stack failed to start; private startup output was not published" >&2
            exit 1
          fi

          npx --yes "supabase@${MAPKLUSS_SUPABASE_CLI_VERSION}" status \
            --workdir "$MAPKLUSS_RESTORE_PROJECT" \
            --output env >"$status_env"
          chmod 600 "$start_log" "$status_env"
          db_url=$(node -e '
            const fs = require("node:fs");
            const line = fs.readFileSync(process.argv[1], "utf8")
              .split(/\r?\n/)
              .find((value) => value.startsWith("DB_URL="));
            if (!line) process.exit(1);
            const encoded = line.slice("DB_URL=".length).trim();
            process.stdout.write(encoded.startsWith("\"") ? JSON.parse(encoded) : encoded);
          ' "$status_env")
          echo "::add-mask::$db_url"
          node -e '
            const target = new URL(process.argv[1]);
            if (!["127.0.0.1", "localhost"].includes(target.hostname) || target.pathname !== "/postgres") {
              throw new Error("Disposable stack returned an unexpected restore target");
            }
          ' "$db_url"

          pg_bin="${RUNNER_TEMP}/mapkluss-pg17-bin"
          install -d -m 700 "$pg_bin"
          cat >"$pg_bin/psql" <<'PSQL_WRAPPER'
          #!/usr/bin/env bash
          set -euo pipefail
          exec docker run --rm --network host \
            --volume /tmp:/tmp \
            --volume "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE" \
            --volume "$RUNNER_TEMP:$RUNNER_TEMP" \
            --workdir "$PWD" \
            "$MAPKLUSS_POSTGRES_IMAGE" psql "$@"
          PSQL_WRAPPER
          chmod 700 "$pg_bin/psql"

          PATH="$pg_bin:$PATH" psql "$db_url" \
            -X -v ON_ERROR_STOP=1 \
            -c "comment on database postgres is 'mapkluss-disposable-restore-target'" >/dev/null

          archive=$(find "$MAPKLUSS_RESTORE_DIR" -name '*.tar.gz' -type f -print -quit)
          PATH="$pg_bin:$PATH" \
            MAPKLUSS_RESTORE_DB_URL="$db_url" \
            MAPKLUSS_RESTORE_MODE=supabase-base \
            MAPKLUSS_ALLOW_DESTRUCTIVE_RESTORE=disposable-only \
            MAPKLUSS_ALLOW_MARKED_LOCAL_POSTGRES=disposable-stack \
            ./deploy/backups/restore-drill.sh "$archive"

      - name: Stop and remove disposable restore environment
        if: ${{ always() && env.MAPKLUSS_RUN_RESTORE_DRILL == 'true' }}
        env:
          MAPKLUSS_SUPABASE_CLI_VERSION: 2.109.1
        run: |
          if [[ -f "$MAPKLUSS_RESTORE_PROJECT/supabase/config.toml" ]]; then
            npx --yes "supabase@${MAPKLUSS_SUPABASE_CLI_VERSION}" stop \
              --workdir "$MAPKLUSS_RESTORE_PROJECT" \
              --no-backup >/dev/null 2>&1 || true
          fi
          rm -rf \
            "$MAPKLUSS_RESTORE_DIR" \
            "$MAPKLUSS_RESTORE_PROJECT" \
            "${RUNNER_TEMP}/mapkluss-restore-verify" \
            "${RUNNER_TEMP}/mapkluss-pg17-bin" \
            "${RUNNER_TEMP}/mapkluss-supabase-start.log" \
            "${RUNNER_TEMP}/mapkluss-supabase-status.env"

      - name: Remove plaintext backup from runner
        if: always()
        run: rm -rf "$MAPKLUSS_BACKUP_DIR"
